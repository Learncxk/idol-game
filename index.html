<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>星光之路 · 爱豆模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#333;overflow-x:hidden;min-height:100vh;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%)}
:root{--pink:#ff6b9d;--dark-pink:#e8437a;--purple:#a855f7;--gold:#fbbf24;--blue:#60a5fa;--green:#34d399;--card:rgba(255,255,255,0.95);--radius:16px;--shadow:0 8px 32px rgba(0,0,0,0.12);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px)}
.hidden{display:none!important}

/* ===== 开场 ===== */
#intro-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 0%,#1e2a5a,#0a0a1a)}
.intro-card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px 28px;max-width:380px;width:100%;text-align:center;color:#fff}
.intro-card h1{font-size:34px;background:linear-gradient(135deg,#ff6b9d,#a855f7,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.intro-card .subtitle{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:24px}
.intro-card label{display:block;text-align:left;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:4px}
.intro-card input[type=text]{width:100%;padding:12px 16px;border:2px solid rgba(255,255,255,0.15);border-radius:12px;font-size:16px;outline:none;background:rgba(255,255,255,0.08);color:#fff;margin-bottom:14px;transition:border .3s}
.intro-card input[type=text]:focus{border-color:var(--pink)}
.intro-card input[type=text]::placeholder{color:rgba(255,255,255,0.3)}
.avatar-select{display:flex;gap:10px;justify-content:center;margin:10px 0 20px;flex-wrap:wrap}
.avatar-select .av-opt{font-size:36px;cursor:pointer;padding:6px;border-radius:50%;border:2px solid transparent;transition:all .3s;line-height:1;width:50px;height:50px;display:flex;align-items:center;justify-content:center}
.avatar-select .av-opt.selected{border-color:var(--pink);background:rgba(255,107,157,0.2);transform:scale(1.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border:none;border-radius:40px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;color:#fff;min-height:44px;position:relative;overflow:hidden;touch-action:manipulation}
.btn:active{transform:scale(0.96)}
.btn-pink{background:linear-gradient(135deg,#ff6b9d,#e8437a)}
.btn-purple{background:linear-gradient(135deg,#a855f7,#7c3aed)}
.btn-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#5d3a2a}
.btn-blue{background:linear-gradient(135deg,#60a5fa,#2563eb)}
.btn-green{background:linear-gradient(135deg,#34d399,#10b981)}
.btn-soft{background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15)}
.intro-card .start-btn{width:100%;padding:14px;font-size:17px;margin-top:6px;background:linear-gradient(135deg,#ff6b9d,#a855f7);box-shadow:0 4px 20px rgba(255,107,157,0.3)}
.intro-card label[style*="dashed"]:hover{border-color:var(--pink)!important;color:var(--pink)!important}

/* ===== 手机外壳 ===== */
#phone-frame{max-width:420px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#f8f9fe,#f0e6ff);position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,0.3);overflow:hidden}

/* ===== 顶部状态 ===== */
.phone-status{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 4px;font-size:12px;color:#7b4a5e;font-weight:600;background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20;border-bottom:1px solid rgba(0,0,0,0.04)}
.phone-status .day-badge{background:linear-gradient(135deg,#ff6b9d,#a855f7);color:#fff;padding:2px 12px;border-radius:20px;font-size:10px;margin-left:4px}
.phone-status .fans-badge{font-size:12px;color:#e8437a}
.phone-status .avatar-small{font-size:22px;cursor:pointer;transition:transform .3s;background:none;border:none;padding:0}
.phone-status .avatar-small:active{transform:scale(0.9)}
.phone-status .notif-dot{width:8px;height:8px;background:#f43f5e;border-radius:50%;display:inline-block;margin-left:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== 曝光条 ===== */
.exposure-row{display:flex;align-items:center;gap:6px;padding:3px 14px;background:rgba(255,255,255,0.5);backdrop-filter:blur(8px);font-size:10px;color:#666;border-bottom:1px solid rgba(0,0,0,0.04)}
.exposure-row .bar-track{flex:1;height:5px;background:#f0e0e8;border-radius:10px;overflow:hidden}
.exposure-row .bar-fill{height:100%;border-radius:10px;transition:width .5s ease;background:linear-gradient(90deg,#34d399,#fbbf24,#f43f5e)}

/* ===== 目标栏 ===== */
.goal-bar{display:flex;align-items:center;gap:6px;padding:4px 14px;background:rgba(255,255,255,0.55);backdrop-filter:blur(8px);font-size:11px;color:#7b4a5e;border-bottom:1px solid rgba(0,0,0,0.04)}
.goal-bar .goal-text{flex:1;font-weight:500}
.goal-bar .goal-progress{font-weight:700;color:var(--dark-pink)}

/* ===== 主内容 ===== */
#main-content{flex:1;overflow-y:auto;padding:10px 12px 70px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
#main-content::-webkit-scrollbar{width:3px}
#main-content::-webkit-scrollbar-thumb{background:var(--pink);border-radius:10px}

/* ===== 页面通用 ===== */
.page{display:none;animation:fadeUp .3s ease}
.page.active{display:block}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.page-title{font-size:17px;font-weight:700;color:#2d1a2e;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}

/* ===== 首页 ===== */
.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.quick-stat{text-align:center;padding:10px 4px;border-radius:12px;background:linear-gradient(135deg,#fce4ec,#f3e5f5)}
.quick-stat .label{font-size:10px;color:#999}
.quick-stat .value{font-size:17px;font-weight:700;color:#2d1a2e;margin-top:2px}
.quick-stat .value.gold{color:#f59e0b}

.trending-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f5e8f0;cursor:pointer;transition:background .2s}
.trending-item:last-child{border-bottom:none}
.trending-item:active{background:#faf0f5;border-radius:8px;margin:0 -8px;padding:8px}
.trending-item .rank{font-weight:800;font-size:13px;width:22px;min-width:22px;text-align:center;color:#999;padding-top:2px}
.trending-item .rank.top3{color:var(--pink)}
.trending-item .content{flex:1;min-width:0}
.trending-item .content .title{font-size:13px;font-weight:600;color:#333;display:flex;align-items:center;gap:4px}
.trending-item .content .meta{font-size:10px;color:#bbb;margin-top:3px;display:flex;gap:8px}
.trending-item .hot-badge{font-size:9px;background:linear-gradient(135deg,#f43f5e,#e8437a);color:#fff;padding:1px 6px;border-radius:4px;font-weight:600}

/* ===== 消息页 ===== */
.msg-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5e8f0;cursor:pointer;transition:background .2s;border-radius:8px}
.msg-item:active{background:#faf0f5;padding:10px 8px;margin:0 -8px}
.msg-item .avatar{font-size:30px;flex-shrink:0;width:36px;text-align:center}
.msg-item .body{flex:1;min-width:0}
.msg-item .body .sender{font-size:13px;font-weight:600;color:#2d1a2e}
.msg-item .body .sender .tag{font-size:9px;background:#f0e6ff;color:#7c3aed;padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:400}
.msg-item .body .preview{font-size:12px;color:#999;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-item .body .time{font-size:10px;color:#ccc;margin-top:2px}
.msg-item .badge-dot{width:8px;height:8px;background:var(--pink);border-radius:50%;flex-shrink:0;margin-top:6px}
.msg-type-tab{display:flex;gap:2px;margin-bottom:8px;overflow-x:auto;padding:2px 0}
.msg-type-tab::-webkit-scrollbar{height:0}
.msg-tab-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;font-size:12px;cursor:pointer;background:#f0e0e8;color:#999;font-weight:500;transition:all .2s}
.msg-tab-btn.active{background:var(--pink);color:#fff}
.msg-tab-btn:active{transform:scale(0.95)}

/* ===== 聊天/回复模态 ===== */
.chat-modal .chat-area{max-height:55vh;overflow-y:auto;padding:4px 0;display:flex;flex-direction:column;gap:6px}
.chat-modal .chat-area::-webkit-scrollbar{width:3px}
.chat-modal .chat-area::-webkit-scrollbar-thumb{background:var(--pink);border-radius:10px}
.chat-bubble{background:#f0e6ff;border-radius:12px 12px 12px 4px;padding:8px 12px;font-size:13px;line-height:1.6;max-width:88%;color:#333;align-self:flex-start;animation:bubbleIn .3s ease;margin:3px 0}
.chat-bubble.self{background:var(--pink);color:#fff;border-radius:12px 12px 4px 12px;align-self:flex-end}
.chat-bubble.na{background:#f0e6ff}
.chat-bubble .r-opt{display:block;background:rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;margin-top:4px;cursor:pointer;font-size:12px;transition:background .2s}
.chat-bubble .r-opt:active{background:rgba(255,255,255,0.35)}
@keyframes bubbleIn{0%{opacity:0;transform:scale(0.95)}100%{opacity:1;transform:scale(1)}}

/* ===== 日程页 ===== */
.today-card{background:linear-gradient(135deg,#fce4ec,#f3e5f5,#e8f0fe);border-radius:14px;padding:14px;margin-bottom:10px;text-align:center}
.today-card .day-big{font-size:18px;font-weight:700;color:#2d1a2e}
.today-card .stage-name{font-size:12px;color:#666;margin-top:2px}
.today-card .today-tip{font-size:12px;color:#7b4a5e;margin-top:6px;background:rgba(255,255,255,0.5);border-radius:8px;padding:6px 10px;line-height:1.5}
.sched-btn{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:10px 12px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:2px solid transparent;margin-bottom:6px}
.sched-btn:active{transform:scale(0.98);border-color:var(--pink)}
.sched-btn .s-icon{font-size:24px;width:34px;text-align:center}
.sched-btn .s-info{flex:1;min-width:0}
.sched-btn .s-info .s-name{font-size:13px;font-weight:600;color:#2d1a2e}
.sched-btn .s-info .s-desc{font-size:10px;color:#999}
.sched-btn .s-effects{text-align:right;font-size:9px;color:#666;line-height:1.3;white-space:nowrap}
.sched-btn.disabled{opacity:0.35;pointer-events:none}

/* ===== 档案页 ===== */
#radar-canvas{display:block;margin:0 auto;width:100%;max-width:220px;height:auto}
.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
.profile-stat{background:linear-gradient(135deg,#fce4ec,#fff);border-radius:10px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center}
.profile-stat .s-label{font-size:11px;color:#666}
.profile-stat .s-val{font-size:15px;font-weight:700;color:#2d1a2e}
.profile-stat .s-val.pink{color:var(--dark-pink)}
.achieve-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}
.ach-item{text-align:center;padding:6px 2px;border-radius:8px;background:#f5e8f0;font-size:10px;transition:all .3s}
.ach-item.locked{opacity:0.25;filter:grayscale(1)}
.ach-item .ach-icon{font-size:20px;display:block}
.ach-item .ach-name{font-size:8px;color:#7b4a5e;word-break:keep-all}

/* ===== 更多页 ===== */
.more-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:12px;cursor:pointer;transition:all .2s;margin-bottom:6px}
.more-item:active{transform:scale(0.98);background:#f5e8f0}

/* ===== 底部导航 ===== */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:420px;width:100%;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);display:flex;justify-content:space-around;padding:5px 0 calc(5px + var(--safe-bottom));border-top:1px solid rgba(0,0,0,0.06);z-index:30}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 10px;border:none;background:none;cursor:pointer;transition:all .2s;font-size:9px;color:#999;min-width:48px;touch-action:manipulation}
.nav-item .nav-icon{font-size:20px;transition:transform .2s}
.nav-item.active{color:var(--dark-pink)}
.nav-item.active .nav-icon{transform:scale(1.1)}
.nav-item:active .nav-icon{transform:scale(0.9)}

/* ===== 模态框 ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);animation:fadeIn .2s ease}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.modal{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.25);padding:24px 20px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.modal h2{font-size:19px;margin-bottom:4px;text-align:center;color:#2d1a2e}
.modal .modal-sub{text-align:center;font-size:12px;color:#999;margin-bottom:12px;line-height:1.4}
.modal p.modal-text{font-size:14px;line-height:1.7;color:#555;margin-bottom:12px}
.modal .modal-opt{width:100%;padding:10px 14px;font-size:13px;text-align:left;justify-content:flex-start;border-radius:12px;margin-bottom:5px}
.modal .modal-opt:disabled{opacity:0.35;pointer-events:none}
.modal .close-btn{display:block;margin:8px auto 0;min-width:100px}

/* ===== 故事 ===== */
.story-card{text-align:center;padding:16px}
.story-card .s-emoji{font-size:52px;margin-bottom:8px}
.story-card h2{font-size:20px}
.story-card p{font-size:13px;color:#555;line-height:1.7;margin:6px 0}

/* ===== 结局 ===== */
#ending-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 30%,#1e2a5a,#0a0a1a)}
.end-card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px 22px;max-width:400px;width:100%;text-align:center;color:#fff}
.end-card .end-icon{font-size:56px;margin-bottom:6px}
.end-card .end-rank{font-size:40px;margin:6px 0}
.end-card h2{font-size:26px;color:#fff}
.end-card p{font-size:14px;line-height:1.8;color:rgba(255,255,255,0.7);margin:10px 0}
.end-card .end-stats{text-align:left;margin:10px 0;font-size:12px}
.end-card .end-stats .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.7)}
.end-card .restart-btn{margin-top:12px;width:100%;padding:14px}

/* ===== 浮动文字 ===== */
.float-text{position:fixed;pointer-events:none;font-weight:700;font-size:19px;z-index:999;animation:floatUp 1.5s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(0.5)}}

/* ===== 成就 ===== */
.ach-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;background:linear-gradient(135deg,#fff9c4,#fff3e0);border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.25);padding:28px 22px;text-align:center;max-width:280px;width:90%;animation:achPop .5s ease-out}
@keyframes achPop{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.08)}100%{transform:translate(-50%,-50%) scale(1)}}
.ach-popup .icon{font-size:40px}
.ach-popup h3{font-size:17px;color:#e65100}
.ach-popup p{font-size:12px;color:#795548;margin:4px 0}

.star-burst{position:fixed;pointer-events:none;z-index:150;top:0;left:0;right:0;bottom:0}
.star{position:absolute;font-size:20px;animation:starFly 1.2s ease-out forwards}
@keyframes starFly{0%{opacity:1;transform:translate(0,0) scale(0) rotate(0deg)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.3) rotate(360deg)}}

.fan-cel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;display:flex;align-items:center;justify-content:center;pointer-events:none}
.fan-cel .text{font-size:40px;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fanPop 2s ease-out forwards}
@keyframes fanPop{0%{transform:scale(0)}30%{transform:scale(1.25)}100%{transform:scale(1);opacity:0}}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;z-index:300;animation:toastIn .3s ease-out;backdrop-filter:blur(8px);max-width:80%;text-align:center;pointer-events:none}
@keyframes toastIn{0%{transform:translateX(-50%) translateY(-30px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}

@media(min-width:421px){#phone-frame{border-radius:28px;margin:12px auto;min-height:calc(100vh - 24px)}.bottom-nav{border-radius:0 0 28px 28px}}
</style>
</head>
<body>

<!-- ===== 开场 ===== -->
<div id="intro-screen">
  <div class="intro-card">
    <h1>✨星光之路✨</h1>
    <p class="subtitle">创造属于你的偶像传奇 💖</p>
    <label>🌟 艺名</label>
    <input type="text" id="player-name" value="星光学员" maxlength="10">
    <label>👩 选择头像 <span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:400">（点击预设或上传照片）</span></label>
    <div class="avatar-select" id="avatar-select">
      <span class="av-opt selected" data-av="👩‍🎤">👩‍🎤</span>
      <span class="av-opt" data-av="👸">👸</span>
      <span class="av-opt" data-av="🧝‍♀️">🧝‍♀️</span>
      <span class="av-opt" data-av="🦊">🦊</span>
      <span class="av-opt" data-av="🌸">🌸</span>
      <span class="av-opt" data-av="💃">💃</span>
    </div>
    <div style="margin:8px 0 16px">
      <label style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border:2px dashed rgba(255,255,255,0.2);border-radius:12px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.6);transition:all .3s">
        📁 上传自己的照片
        <input type="file" id="avatar-upload" accept="image/*" style="display:none">
      </label>
      <div id="custom-avatar-preview" style="margin-top:8px;display:none">
        <img id="custom-avatar-img" style="width:56px;height:56px;border-radius:50%;border:3px solid var(--pink);object-fit:cover">
        <span style="font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-top:4px">✅ 已上传，点击开始游戏</span>
      </div>
    </div>
    <button class="btn start-btn" id="start-game-btn">🚀 开启偶像之旅</button>
    <p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:12px">💾 自动存档 · 随时继续</p>
  </div>
</div>

<!-- ===== 手机 ===== -->
<div id="phone-frame" class="hidden">
  <!-- 状态栏 -->
  <div class="phone-status">
    <span>📅 第 <span id="day-num">1</span> 天 <span class="day-badge" id="stage-tag">🎯练习生</span></span>
    <button class="avatar-small" id="avatar-btn"><span id="avatar-text">👩‍🎤</span><img id="avatar-img" class="hidden" style="width:26px;height:26px;border-radius:50%;object-fit:cover"></button>

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function pick(arr){return arr[rand(0,arr.length-1)]}
function formatNum(n){if(n>=10000)return (n/10000).toFixed(1)+'万';if(n>=1000)return (n/1000).toFixed(1)+'k';return String(n)}
function getStage(day){for(const s of STAGES){if(day>=s.days[0]&&day<=s.days[1])return s}return STAGES[STAGES.length-1]}

function playBeep(f,d){
  try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f||800;g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(d||0.12));o.start();o.stop(c.currentTime+(d||0.12))}catch(e){}
}

function showFloat(x,y,text,color){
  const el=document.createElement('div');el.className='float-text';
  el.textContent=text;el.style.left=x+'px';el.style.top=y+'px';el.style.color=color||'#e8437a';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1500)
}
let toastTimer=null;

  const old=document.querySelector('.toast');if(old)old.remove();
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{if(el.parentNode)el.remove()},2000)
}

// 数值变化
function changeStat(name,delta,showF=true){
  if(!state||delta===0)return delta;
  const old=state[name];
  if(name==='fans'){state[name]=Math.max(0,Math.floor(state[name]+delta))}
  else if(name==='money'){state[name]=Math.max(0,state[name]+delta)}
  else if(name==='exposure'){state[name]=clamp(state[name]+delta,0,100)}
  else if(name==='stamina'){state[name]=clamp(state[name]+delta,0,100)}
  else{state[name]=clamp(state[name]+delta,0,100)}
  const ad=state[name]-old;
  if(showF&&ad!==0){
    const x=rand(40,window.innerWidth-100),y=rand(80,250);
    const sign=ad>0?'+':'';const color=ad>0?'#34d399':'#f43f5e';
    const lb={beauty:'颜值',talent:'才艺',stamina:'体力',popularity:'人气',fans:'粉丝',money:'金钱',eq:'情商',exposure:'曝光'};
    showFloat(x,y,`${sign}${ad} ${lb[name]||name}`,color)
  }
  return ad;
}

function generateTrending(){
  if(!state)return;
  const trends=[];
  const pool=TRENDING_POOL[0].tpl;
  const count=rand(4,6);
  const used=[];
  for(let i=0;i<count;i++){
    let idx;
    do{idx=rand(0,pool.length-1)}while(used.includes(idx)&&used.length<pool.length);
    used.push(idx);
    const tpl=pool[idx];
    const title=tpl.replace('{idol}',state.name);
    trends.push({
      rank:i+1,title,
      hot:rand(10,99)+'万',
      cat:pick(['🔥爆','⚡热','💥沸']),
      comments:generateComments(title)
    });
  }
  // 基于游戏状态的玩家相关热搜
  let myTitle='';
  if(state.exposure>60){myTitle=`${state.name} ${pick(['被曝私照','绯闻缠身','狗仔跟拍','黑料满天飞'])}`;}
  else if(state.relations&&state.relations.fans>70){myTitle=`${state.name} ${pick(['粉丝见面会感动落泪','最新舞台封神','暖心宠粉瞬间','实力圈粉时刻'])}`;}
  else if(state.lastAction==='work'){myTitle=`${state.name} ${pick(['新剧路透','最新杂志大片','代言官宣','综艺名场面'])}`;}
  else if(state.lastAction==='fans'){myTitle=`${state.name} ${pick(['直播撒娇超可爱','自拍九宫格','粉丝互动太甜了','空降粉丝群'])}`;}
  else {myTitle=`${state.name} ${pick(['今日份美貌营业','下班路透','最新动态','工作室更新'])}`;}

  if(state.fans>500){
    const idx=rand(0,trends.length-1);
    const cat=state.exposure>50?'📸争议':'🔥热';
    trends.splice(idx,0,{rank:'⚡',title:myTitle,hot:formatNum(state.fans),cat:cat,isMine:true,comments:generateComments(myTitle,true)});
  }
  state.trending=trends;
}

function generateComments(title,isMine){
  const count=rand(3,6);
  const comments=[];
  for(let i=0;i<count;i++){
    const user=pick(COMMENT_USERS);
    const styles=[COMMENTS_EXCITED,COMMENTS_NEUTRAL,COMMENTS_CRITICAL];
    const style=pick(styles);
    const text=pick(style);
    comments.push({
      user,text,
      likes:rand(10,9999),
      time:rand(1,60)+'分钟前'
    });
  }
  return comments;
}

/* ================================================================
   核心玩法
   ================================================================ */
function executeAction(actionId){
  if(!state)return;
  const action=ACTIONS.find(a=>a.id===actionId);
  if(!action)return;
  if(action.staminaCost&&state.stamina<action.staminaCost){showToast('体力不够了！先去休息吧 😴');soundBad();return}
  if(action.moneyCost&&state.money<action.moneyCost){showToast('钱不够了！💰');soundBad();return}
  // 高曝光时部分行动受限
  if(state.exposure>70&&(actionId==='fans'||actionId==='social')){
    showToast('📸 曝光太高了！先低调几天吧！');soundBad();return
  }

  soundClick();
  if(action.staminaCost)changeStat('stamina',-action.staminaCost,false);
  if(action.moneyCost)changeStat('money',-action.moneyCost,false);

  // 曝光影响加强
  let riskMult=1;
  if(state.exposure>60)riskMult=1.5;
  if(action.risk){
    const actualRisk=Math.round(action.risk*riskMult);
    changeStat('exposure',actualRisk,false);
  }

  let msg=pick(action.msg);
  if(action.stat&&action.min!=null){const v=rand(action.min,action.max);changeStat(action.stat,v);const lb={talent:'才艺',beauty:'颜值'}[action.stat]||action.stat;msg+=` ${lb}+${v}`}
  if(action.popMin!=null){const v=rand(action.popMin,action.popMax);changeStat('popularity',v);msg+=` 人气+${v}`}
  if(action.eqMin!=null){const v=rand(action.eqMin,action.eqMax);changeStat('eq',v);msg+=` 情商+${v}`}
  if(action.moneyMin!=null){const v=rand(action.moneyMin,action.moneyMax);changeStat('money',v);msg+=` 💰+${v}`}
  if(action.staminaMin!=null){const v=rand(action.staminaMin,action.staminaMax);changeStat('stamina',v);msg+=` 🛌体力+${v}`}

  if(actionId==='train')state.totalTrainDays=(state.totalTrainDays||0)+1;
  if(actionId==='train'&&Math.random()<0.2){changeStat('stamina',-10);msg+=' 😫 扭到脚了！';soundBad()}
  if(actionId==='fans'&&Math.random()<0.1){changeStat('popularity',-8);changeStat('exposure',8);msg+=' 😰 发帖翻车了！曝光+8';soundBad()}
  if(actionId==='work'&&Math.random()<0.2&&state.stamina<25){changeStat('stamina',-15);msg+=' 🤒 累倒送医！';soundBad()}
  if(actionId==='rest'&&Math.random()<0.2){changeStat('talent',2);msg+=' 💡 休息时来了灵感'}
  if(actionId==='lowkey'&&state.exposure>30){changeStat('exposure',-5,false);msg+=' 📸 有效降低了曝光'}

  // 关系影响
  if(!state.relations)state.relations=initRelations();
  if(actionId==='lowkey'||actionId==='rest'){state.relations.fans=Math.max(0,state.relations.fans-2)}
  if(actionId==='fans'){state.relations.fans=Math.min(100,state.relations.fans+3)}
  if(actionId==='work'){state.relations.brand=Math.min(100,state.relations.brand+2)}
  if(actionId==='social'){state.relations.agent=Math.min(100,state.relations.agent+3)}

  addLog(`📌 ${action.icon} ${action.name}：${msg}`);
  state.fans=state.fans+Math.floor(state.popularity*3)+rand(3,15);
  state.fans=Math.min(state.fans,999999999);
  state.lastAction=actionId;
  if(!state.actionCount)state.actionCount={};
  state.actionCount[actionId]=(state.actionCount[actionId]||0)+1;

  renderAll();saveGame();soundGood();
  checkFanMilestones();

  // 曝光过高触发即时危机
  if(state.exposure>80&&Math.random()<0.35){
    showCrisisEvent('📸 狗仔曝出你的私照！','曝光失控，大量私密照片被曝光！',{popularity:-15,fans:-Math.floor(state.fans*0.05),exposure:10});
    return;
  }
  if(state.exposure>60&&Math.random()<0.15){
    addMessage('agent','👩‍💼','经纪人杨姐','出事了！狗仔拍到你……快想办法压下去！📸','经纪人');
    showToast('⚠️ 经纪人发来紧急消息！');
  }

  // 随机事件
  const evtChance=0.3+(state.luck-20)/100;
  if(Math.random()<evtChance){
    const stage=getStage(state.day);
    const candidates=EVENTS.filter(e=>e.stages.includes(0)||e.stages.includes(stage.id));
    const possible=candidates.filter(e=>Math.random()<e.chance);
    if(possible.length>0){setTimeout(()=>showEventModal(pick(possible)),400);return}
  }
  setTimeout(()=>endDay(),500);
}

/* ================================================================
   事件模态框
   ================================================================ */
function showEventModal(evt){
  const con=document.getElementById('modal-container');
  con.className='modal-overlay';
  const stage=getStage(state.day);
  let html=`<div class="modal"><h2>💥 突发事件</h2><div class="modal-sub">${stage.emoji} ${stage.name} · 第${state.day}天</div><p class="modal-text">${evt.text}</p><div class="modal-options" id="event-options">`;
  evt.opts.forEach((o,i)=>{
    const needStr=o.need?Object.entries(o.need).map(([k,v])=>`${k}≥${v}`).join(','):'';
    const can=!o.need||Object.entries(o.need).every(([k,v])=>(state[k]||0)>=v);
    html+=`<button class="btn btn-pink modal-opt" data-opt="${i}" ${can?'':'disabled'}>${o.text}${needStr?' (需要'+needStr+')':''}</button>`;
  });
  html+=`</div></div>`;
  con.innerHTML=html;con.classList.remove('hidden');
  con.querySelector('#event-options').addEventListener('click',function(e){
    const btn=e.target.closest('button');if(!btn||btn.disabled)return;
    const idx=parseInt(btn.dataset.opt);const opt=evt.opts[idx];
    if(opt.need&&!Object.entries(opt.need).every(([k,v])=>(state[k]||0)>=v)){showToast('条件不足！');return}
    const changes=[];
    for(const[k,v]of Object.entries(opt.eff)){
      if(k==='fans'&&v>-1&&v<1){const a=Math.floor(state.fans*Math.abs(v));const d=v<0?-a:a;changeStat('fans',d);changes.push(`${d>0?'+':''}${d}粉丝(${Math.round(v*100)}%)`)}
      else if(k==='fans'){const d=changeStat(k,v);changes.push(`${d>0?'+':''}${d}粉丝`)}
      else if(k==='exposure'){const d=changeStat(k,v);changes.push(`${d>0?'+':''}${d}曝光`)}
      else{const d=changeStat(k,v);const lbs={talent:'才艺',beauty:'颜值',stamina:'体力',popularity:'人气',eq:'情商',money:'金钱'};const lb=lbs[k]||k;if(d!==0)changes.push(`${d>0?'+':''}${d}${lb}`)}
    }
    const rm=opt.msg||'事件结束。';
    con.innerHTML=`<div class="modal"><h2>📋 事件结果</h2><div class="modal-sub">${evt.text}</div><div style="text-align:center"><p style="font-weight:600;margin:8px 0">👉 ${opt.text.replace(/^[^\s]+\s/,'')}</p>${changes.map(c=>`<div style="color:${c.startsWith('+')?'#34d399':'#f43f5e'};margin:3px 0">${c}</div>`).join('')}<p style="color:#666;margin:8px 0">${rm}</p><button class="btn btn-pink close-btn" id="evt-close">继续 ➡️</button></div></div>`;
    con.querySelector('#evt-close').addEventListener('click',()=>{
      con.classList.add('hidden');addLog(`⚡ ${evt.text} → ${rm}`);
      soundGood();renderAll();saveGame();
      setTimeout(()=>endDay(),500);
    });
  });
}

/* ================================================================
   结束一天
   ================================================================ */
function endDay(){
  if(!state)return;
  state.luck=clamp(state.luck+rand(-5,5),0,100);

  generateDailyVibe();
  const vibe=state.dailyVibe;
  if(state.dailySideEvent)addLog('💭 '+state.dailySideEvent,'flavor');
  if(state.dailyGossip)addLog('📰 '+state.dailyGossip,'gossip');
  if(vibe&&vibe.buff==='stamina')changeStat('stamina',vibe.buffAmt,false);
  else if(vibe&&vibe.buff==='luck')state.luck=clamp(state.luck+vibe.buffAmt,0,100);

  // ===== 每日生活费 =====
  if(state.day>1&&state.money<DAILY_COST){
    state.moneyDebt=(state.moneyDebt||0)+1;
    changeStat('stamina',-5,false);
    addLog('💸 没钱交生活费了……体力-5','flavor');
    if(state.moneyDebt>3){
      showGameOver('破产了 😢','连续多日入不敷出，你付不起房租和生活费，不得不回老家……');
      return;
    }
  }else if(state.day>1){
    changeStat('money',-DAILY_COST,false);
    state.moneyDebt=0;
  }

  // ===== 每日自动增长 =====
  const fanGain=Math.floor(state.popularity*3+rand(3,15));
  changeStat('fans',fanGain,false);
  changeStat('popularity',1,false);

  const stage=getStage(state.day);
  if(stage.id===2){const pg=Math.floor(state.talent*0.2+state.beauty*0.15)+rand(1,4);changeStat('popularity',pg,false);changeStat('fans',pg*10,false)}
  if(stage.id===4)changeStat('popularity',rand(1,3),false);

  // ===== 曝光自然变化 =====
  // 曝光 > 30: 每天自然降低（但需要花钱公关）
  if(state.exposure>20){
    const decay=rand(1,3);
    changeStat('exposure',-decay,false);
  }
  // 曝光 > 50: 花钱公关才能降
  if(state.exposure>50&&state.money>=300){
    const cost=Math.min(300,Math.floor(state.money*0.1));
    changeStat('money',-cost,false);
    const reduce=rand(2,4);
    changeStat('exposure',-reduce,false);
    addLog(`📸 花${cost}做公关，曝光-${reduce}`,'flavor');
  }else if(state.exposure>50&&state.money<300){
    addLog('📸 没钱做公关……曝光居高不下！','gossip');
    changeStat('popularity',-rand(2,5));
    changeStat('fans',-Math.floor(state.fans*0.01));
  }

  // ===== 曝光危机系统 =====
  if(state.exposure>70){
    if(!state.exposureWarned){
      addMessage('agent','👩‍💼','经纪人杨姐','曝光太高了！快想办法压下去！不然出大事😰','经纪人');
      state.exposureWarned=true;
      showToast('⚠️ 经纪人紧急警告！');
    }
    if(Math.random()<0.15){
      changeStat('popularity',-rand(5,10));
      changeStat('fans',-Math.floor(state.fans*0.03));
      addLog('📸 狗仔又爆黑料！人气和粉丝下降！');soundBad();
    }
  }
  if(state.exposure>85&&Math.random()<0.2){
    showGameOver('塌房了 😱','曝光彻底失控，大量黑料被扒出，事业毁于一旦……');
    return;
  }

  // ===== 关系自然变化 =====
  if(!state.relations)state.relations=initRelations();
  // 粉丝关系：高曝光伤害粉丝
  if(state.exposure>50)state.relations.fans=Math.max(0,state.relations.fans-rand(1,3));
  // 品牌关系：高曝光伤害品牌信任
  if(state.exposure>60)state.relations.brand=Math.max(0,state.relations.brand-rand(1,2));
  // 经纪人关系：久不回消息下降
  if(state.messages&&state.messages.some(m=>m.type==='agent'&&!m.read)){
    state.relations.agent=Math.max(0,state.relations.agent-2);
  }

  // ===== 各阶段目标检测 =====
  if(stage.id===1&&state.day===10){
    if(state.talent<50){showGameOver('被淘汰了 😢','第10天考核未通过，才艺未达50。练习生生涯到此结束。');return}
    else{state.stage1Passed=true;addLog('🎉 通过考核！进入选秀阶段！');showToast('🎉 考核通过！')}
  }
  if(stage.id===2&&state.day===20){
    if(state.popularity<30||state.fans<3000){
      showGameOver('选秀落选 😢','人气和粉丝不够，没能成团出道……');
      return;
    }else{addLog('🎉 成功出道！进入新人偶像阶段！');showToast('🎉 成团出道！')}
  }
  if(stage.id===3&&state.day===40){
    if(state.money<5000){
      showGameOver('被迫退圈 😢','赚的钱不够维持生活，不得不放弃偶像事业……');
      return;
    }else{addLog('🎉 事业稳定！迈向顶流之路！');showToast('💰 财务自由！')}
  }

  // ===== 触发基于状态的消息 =====
  generateStateMessages();

  const isNewStage=stage.id>1&&state.day===stage.days[0];
  if(isNewStage){
    showStageStory(stage,()=>{generateTrending();showReport()});
  }else{
    generateTrending();showReport();
  }
}

// 基于游戏状态生成消息，不再完全随机
function generateStateMessages(){
  if(!state)return;
  if(!state.relations)state.relations=initRelations();
  const stage=getStage(state.day);

  // 经纪人消息（基于关系和曝光）
  if(Math.random()<0.35||state.day===1){
    const msgs=getAgentMood(state);
    addMessage('agent','👩‍💼','经纪人杨姐',pick(msgs),'经纪人');
  }

  // 粉丝消息（基于粉丝关系和曝光）
  if(Math.random()<0.3){
    const msgs=getFanMood(state);
    addMessage('fan','💌',pick(SENDERS.fan),pick(msgs),'粉丝');
  }

  // 品牌消息（基于品牌关系）
  if(state.relations.brand>30&&Math.random()<0.2&&state.day>5){
    const msgs=['有个代言想找你谈','新品想请你推广～','合作方案发你了看看？'];
    addMessage('brand','🏪',pick(SENDERS.brand),pick(msgs),'品牌');
  }else if(state.relations.brand<20&&Math.random()<0.15){
    addMessage('brand','🏪',pick(SENDERS.brand),'最近你的形象问题，合作暂时搁置……','品牌');
  }

  // 媒体消息（基于人气）
  if(state.popularity>30&&Math.random()<0.15&&state.day>3){
    const msgs=['想约个专访！','封面拍摄邀请📷','综艺嘉宾邀约！'];
    addMessage('media','📰',pick(SENDERS.media),pick(msgs),'媒体');
  }

  // ===== 负面NPC消息（基于游戏状态）=----
  // 狗仔：曝光高时出现
  if(state.exposure>40&&Math.random()<0.15&&state.day>3&&!state.messages.some(m=>m.type==='paparazzi'&&!m.replied)){
    const msgs=NEGATIVE_MSGS.paparazzi;
    const msg=pick(msgs);
    addMessage('paparazzi','🕵️',pick(SENDERS.paparazzi),msg.text,msg.type);
  }
  // 黑粉：人气高时出现
  if(state.popularity>30&&Math.random()<0.1&&state.day>5&&!state.messages.some(m=>m.type==='antifan'&&!m.replied)){
    const msgs=NEGATIVE_MSGS.antifan;
    const msg=pick(msgs);
    addMessage('antifan','😈',pick(SENDERS.antifan),msg.text,msg.type);
  }
  // 对家：才华高或有工作时出现
  if(state.talent>30&&Math.random()<0.1&&state.day>8&&!state.messages.some(m=>m.type==='rival'&&!m.replied)){
    const msgs=NEGATIVE_MSGS.rival;
    const msg=pick(msgs);
    addMessage('rival','💀',pick(SENDERS.rival),msg.text,msg.type);
  }

  if(state.messages.length>40)state.messages=state.messages.slice(-40);
}

function showGameOver(title,desc){
  const con=document.getElementById('modal-container');
  con.className='modal-overlay';
  con.innerHTML=`<div class="modal" style="text-align:center"><div style="font-size:56px;margin-bottom:8px">😢</div><h2>${title}</h2><p style="margin:10px 0;color:#555;line-height:1.8">${desc}</p><button class="btn btn-pink close-btn" id="go-restart">🔄 重新开始</button></div>`;

}
function showEnding(){
  document.getElementById('phone-frame').classList.add('hidden');
  document.getElementById('bottom-nav').classList.add('hidden');
  document.getElementById('ending-screen').classList.remove('hidden');
  let ending=ENDINGS.find(e=>e.always);const s=state;
  for(const e of ENDINGS){
    if(e.minFans&&s.fans<e.minFans)continue;if(e.minTalent&&s.talent<e.minTalent)continue;
    if(e.minPopularity&&s.popularity<e.minPopularity)continue;if(e.minEq&&s.eq<e.minEq)continue;
    if(e.minExposure&&s.exposure<e.minExposure)continue;ending=e;break;
  }
  const rs={SSS:'⭐⭐⭐',SS:'⭐⭐',S:'⭐',A:'💫',B:'🔥',C:'📸',D:'💧'};
  document.getElementById('ending-screen').innerHTML=`<div class="end-card"><div class="end-icon">${ending.icon}</div><div class="end-rank">${rs[ending.rank]||'⭐'}</div><h2>${ending.name}</h2><p>${ending.desc}</p><div class="end-stats">${['talent','beauty','popularity'].map(k=>`<div class="row"><span>${({talent:'🎵才艺',beauty:'💎颜值',popularity:'🔥人气'})[k]}</span><span>${s[k]}</span></div>`).join('')}<div class="row"><span>👥粉丝</span><span>${formatNum(s.fans)}</span></div><div class="row"><span>📸曝光</span><span>${s.exposure}%</span></div><div class="row"><span>🏆成就</span><span>${(s.achievements||[]).length}</span></div></div><button class="btn btn-pink restart-btn" id="end-restart">🔄 重新开始</button></div>`;
  document.getElementById('end-restart').addEventListener('click',()=>{clearSave();resetToIntro()});
  soundAch();
}

/* ================================================================
   成就&里程碑
   ================================================================ */
function checkFanMilestones(){
  if(!state.fanMilestones)state.fanMilestones=[];
  for(const m of FAN_MILESTONES){
    if(state.fans>=m.count&&!state.fanMilestones.includes(m.count)){
      state.fanMilestones.push(m.count);
      const el=document.createElement('div');el.className='fan-cel';
      el.innerHTML=`<div class="text">🎉 ${m.label} 🎉</div>`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
    }
  }
}
function checkAchievements(){
  if(!state.achievements)state.achievements=[];
  const news=[];
  for(const a of ACHIEVEMENTS){if(!state.achievements.includes(a.id)&&a.check(state)){state.achievements.push(a.id);news.push(a)}}
  for(const a of news){
    const pop=document.createElement('div');pop.className='ach-popup';
    pop.innerHTML=`<div class="icon">${a.icon}</div><h3>🏆 成就解锁！</h3><p>${a.name}</p><button class="btn btn-gold close-btn" style="margin-top:8px">太棒了！🎉</button>`;
    document.body.appendChild(pop);
    pop.querySelector('.close-btn').addEventListener('click',()=>pop.remove());
    setTimeout(()=>{if(pop.parentNode)pop.remove()},4000);
    const c=document.createElement('div');c.className='star-burst';
    const stars=['⭐','✨','🌟','💫','🎉'];
    for(let i=0;i<15;i++){
      const s=document.createElement('div');s.className='star';s.textContent=pick(stars);
      const a=(360/15)*i,d=rand(50,140);
      s.style.left='50%';s.style.top='50%';
      s.style.setProperty('--tx',Math.cos(a*Math.PI/180)*d+'px');
      s.style.setProperty('--ty',Math.sin(a*Math.PI/180)*d+'px');
      s.style.animationDelay=(i*0.04)+'s';c.appendChild(s);
    }
    document.body.appendChild(c);setTimeout(()=>c.remove(),1400);
    soundAch();
  }
}

function drawRadar(){
  const ca=document.getElementById('radar-canvas');const ctx=ca.getContext('2d');
  const w=ca.width,h=ca.height,cx=w/2,cy=h/2,r=Math.min(cx,cy)-24;
  ctx.clearRect(0,0,w,h);
  const items=[{label:'💎颜值',val:state.beauty,color:'#ff6b9d'},{label:'🎵才艺',val:state.talent,color:'#a855f7'},{label:'⚡体力',val:state.stamina,color:'#34d399'},{label:'🔥人气',val:state.popularity,color:'#fbbf24'},{label:'💬情商',val:state.eq,color:'#60a5fa'}];
  const n=items.length;
  for(let ri=1;ri<=4;ri++){const rr=(ri/4)*r;ctx.beginPath();for(let i=0;i<=n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;const x=cx+rr*Math.cos(a),y=cy+rr*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.strokeStyle='rgba(200,200,220,0.3)';ctx.lineWidth=1;ctx.stroke()}
  for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle='rgba(200,200,220,0.3)';ctx.stroke()}
  ctx.beginPath();for(let i=0;i<=n;i++){const idx=i%n,val=items[idx].val/100;const a=(Math.PI*2/n)*i-Math.PI/2;const x=cx+r*val*Math.cos(a),y=cy+r*val*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.fillStyle='rgba(255,107,157,0.15)';ctx.fill();ctx.strokeStyle='#ff6b9d';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<n;i++){const val=items[i].val/100;const a=(Math.PI*2/n)*i-Math.PI/2;const x=cx+r*val*Math.cos(a),y=cy+r*val*Math.sin(a);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=items[i].color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke()}
  ctx.font='11px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2,lr=r+20;ctx.fillStyle='#7b4a5e';ctx.fillText(items[i].label+' '+items[i].val,cx+lr*Math.cos(a),cy+lr*Math.sin(a))}
}

function renderMessages(){

  // 消息分类标签

    {id:'fan',label:'💕粉丝',icon:'💕'},

    {id:'brand',label:'🏪品牌',icon:'🏪'},
    {id:'fanclub',label:'🌟后援会',icon:'🌟'},
    {id:'paparazzi',label:'🕵️狗仔',icon:'🕵️'},
    {id:'antifan',label:'😈黑粉',icon:'😈'},
    {id:'rival',label:'💀对家',icon:'💀'}
  ];
  tabs.innerHTML=threadTypes.map(t=>`<button class="msg-tab-btn ${state.msgTab===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  tabs.querySelectorAll('.msg-tab-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      state.msgTab=this.dataset.tab;renderMessages();soundClick();
    });
  });

  // 按NPC线程分组
  const threads={};
  msgs.forEach(m=>{
    const key=m.type||'other';
    if(!threads[key])threads[key]=[];
    threads[key].push(m);
  });

  // 过滤
  let filteredTypes=Object.keys(threads);
  if(state.msgTab!=='all')filteredTypes=filteredTypes.filter(t=>t===state.msgTab);

  if(filteredTypes.length===0){
    el.innerHTML='<div style="text-align:center;padding:20px;color:#ccc;font-size:14px">📭 暂无消息</div>';return;
  }

  // 线程排序：有未读的优先
  filteredTypes.sort((a,b)=>{
    const aUnread=threads[a].some(m=>!m.read)?1:0;
    const bUnread=threads[b].some(m=>!m.read)?1:0;
    return bUnread-aUnread;
  });

  const threadMeta={
    agent:{icon:'👩‍💼',name:'经纪人·杨姐',tag:'经纪人'},
    fan:{icon:'💌',name:'粉丝们',tag:'粉丝'},
    media:{icon:'📰',name:'媒体邀约',tag:'媒体'},
    brand:{icon:'🏪',name:'品牌合作',tag:'品牌'},
    fanclub:{icon:'🌟',name:'后援会',tag:'后援会'},
    paparazzi:{icon:'🕵️',name:'狗仔队',tag:'⚠️危险'},
    antifan:{icon:'😈',name:'黑粉',tag:'⚠️危险'},
    rival:{icon:'💀',name:'对家',tag:'⚠️危险'}
  };

  el.innerHTML=filteredTypes.map(type=>{
    const ms=threads[type];
    const meta=threadMeta[type]||{icon:'💬',name:'未知',tag:''};
    const last=ms[ms.length-1];
    const unread=ms.some(m=>!m.read);
    const count=ms.length;
    return `<div class="msg-item" data-thread="${type}">
      <div class="avatar">${meta.icon}</div>
      <div class="body">
        <div class="sender">${meta.name} <span class="tag">${meta.tag} · ${count}条</span></div>
        <div class="preview">${last?last.text:'暂无消息'}</div>
        <div class="time">最新：第${last?last.day:'?'}天${unread?' · 💬未读':''}</div>
      </div>
      ${unread?'<div class="badge-dot"></div>':''}
    </div>`;
  }).join('');

  el.querySelectorAll('.msg-item').forEach(item=>{
    item.addEventListener('click',function(){
      const type=this.dataset.thread;
      showChatWindow(type);
      soundClick();
    });
  });
}

// NPC聊天窗口——显示完整对话历史
function showChatWindow(type){
  const con=document.getElementById('modal-container');
  const msgs=(state.messages||[]).filter(m=>m.type===type);
  const meta={
    agent:{icon:'👩‍💼',name:'经纪人·杨姐',color:'#fce4ec'},
    fan:{icon:'💌',name:'粉丝们',color:'#e8f5e9'},
    media:{icon:'📰',name:'媒体邀约',color:'#e3f2fd'},
    brand:{icon:'🏪',name:'品牌合作',color:'#fff8e1'},
    fanclub:{icon:'🌟',name:'后援会',color:'#f3e5f5'},
    paparazzi:{icon:'🕵️',name:'狗仔队',color:'#fef2f2'},
    antifan:{icon:'😈',name:'黑粉',color:'#fef2f2'},
    rival:{icon:'💀',name:'对家',color:'#fef2f2'}
  }[type]||{icon:'💬',name:'聊天',color:'#f5f5f5'};

  // 标记该线程所有消息为已读
  msgs.forEach(m=>m.read=true);

  // 检查NPC类型是否危险
  const isNegative=['paparazzi','antifan','rival'].includes(type);

  con.className='modal-overlay chat-modal';
  let chatHtml='';
  let lastDay=0;

  // 时间分隔线
  msgs.forEach(m=>{
    if(m.day!==lastDay){chatHtml+=`<div style="text-align:center;font-size:10px;color:#ccc;margin:8px 0">—— 第${m.day}天 ——</div>`;lastDay=m.day}
    chatHtml+=`<div class="chat-bubble ${isNegative?'':'na'}">${m.text}<div style="font-size:9px;color:#999;margin-top:3px">${m.label||''} · 第${m.day}天</div></div>`;
    if(m.replies){
      m.replies.forEach(r=>{
        chatHtml+=`<div class="chat-bubble self">${r.text}<div style="font-size:9px;opacity:0.6;margin-top:3px">${r.time||''}</div></div>`;
      });
    }
  });

  // 查找是否有未回复的最近一条消息
  const lastMsg=msgs.length>0?msgs[msgs.length-1]:null;
  const canReply=lastMsg&&!lastMsg.replied;

  // 回复选项（基于NPC类型，回复会影响关系）
  let replyOpts='';
  if(canReply){
    const replies=getReplyOptions(type,lastMsg);
    replyOpts=replies.map(r=>`<div class="r-opt" data-reply='${JSON.stringify(r).replace(/'/g,"&#39;")}'>${r.text}</div>`).join('');
  }

  const headerColor=isNegative?'#fef2f2':meta.color;
  con.innerHTML=`<div class="modal" style="padding:14px;max-height:80vh">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 12px;background:${headerColor};border-radius:12px">
      <span style="font-size:28px">${meta.icon}</span>
      <div>
        <div style="font-weight:600;color:#2d1a2e;font-size:14px">${meta.name}</div>
        <div style="font-size:11px;color:#999">${isNegative?'⚠️ 谨慎回应，你的选择会影响局势':msgs.length+'条消息'}</div>
      </div>
    </div>
    <div class="chat-area">
      ${chatHtml||'<div style="text-align:center;color:#ccc;padding:20px">暂无消息记录</div>'}
      ${replyOpts?`<div style="margin-top:8px;padding:8px 10px;background:var(--pink);border-radius:12px;color:#fff;align-self:flex-end">
        <div style="font-size:11px;margin-bottom:4px;opacity:0.8">💬 回复${type==='paparazzi'?'狗仔':type==='antifan'?'黑粉':type==='rival'?'对家':''}：</div>
        ${replyOpts}
      </div>`:''}
      ${!canReply&&msgs.length>0?'<div style="text-align:center;font-size:11px;color:#ccc;margin-top:6px">✅ 已回复过该消息</div>':''}
    </div>
    <button class="btn btn-pink close-btn" id="chat-win-close" style="margin-top:8px;min-width:100px">关闭</button>
  </div>`;

  con.querySelector('#chat-win-close').addEventListener('click',()=>{
    con.classList.add('hidden');renderMessages();saveGame()
  });

  // 回复功能
  con.querySelectorAll('.r-opt').forEach(opt=>{
    opt.addEventListener('click',function(){
      const replyData=JSON.parse(this.dataset.reply);
      // 应用回复效果
      const eff=replyData.eff||{};
      for(const[k,v]of Object.entries(eff)){
        if(k==='fans'&&v>-1&&v<1){const a=Math.floor(state.fans*Math.abs(v));changeStat('fans',v<0?-a:a,false)}
        else changeStat(k,v,false);
      }
      // 关系影响
      const rel=replyData.rel||{};
      if(!state.relations)state.relations=initRelations();
      for(const[k,v]of Object.entries(rel)){
        if(state.relations[k]!==undefined)state.relations[k]=clamp(state.relations[k]+v,0,100);
      }
      // 标记已回复
      if(lastMsg){lastMsg.replied=true;if(!lastMsg.replies)lastMsg.replies=[];lastMsg.replies.push({text:replyData.text,time:'刚刚',self:true})}
      addLog(`💬 回复${meta.name}：${replyData.text}`);
      if(replyData.msg)showToast(replyData.msg);
      if(replyData.eff&&Object.values(replyData.eff).some(v=>v<0))soundBad();else soundGood();
      showChatWindow(type);
      renderAll();saveGame();
    });
  });
}

  const el=document.getElementById('sched-actions');
  el.innerHTML=ACTIONS.map(a=>{
    const disabled=(a.staminaCost&&state.stamina<a.staminaCost)||(a.moneyCost&&state.money<a.moneyCost)||(state.exposure>70&&(a.id==='fans'||a.id==='social'));
    let warn=a.staminaCost&&state.stamina<a.staminaCost?'⚠️体力不足':a.moneyCost&&state.money<a.moneyCost?'⚠️钱不够':'';
    if(state.exposure>70&&(a.id==='fans'||a.id==='social'))warn='📸曝光太高';
    let eff='';
    if(a.stat&&a.min!=null)eff+=`${a.stat==='talent'?'🎵':a.stat==='beauty'?'💎':''}${a.min}~${a.max}`;
    if(a.popMin!=null)eff+=` 🔥${a.popMin}~${a.popMax}`;
    if(a.moneyMin!=null)eff+=` 💰${a.moneyMin}~${a.moneyMax}`;
    if(a.staminaMin!=null)eff+=` 🛌${a.staminaMin}~${a.staminaMax}`;
    if(a.risk!==undefined){
      const actualRisk=a.risk*(state.exposure>60?1.5:1);
      eff+=` 📸${actualRisk>0?'+':''}${Math.round(actualRisk)}`;
    }
    return `<div class="sched-btn ${disabled?'disabled':''}" data-action="${a.id}">
      <div class="s-icon">${a.icon}</div>
      <div class="s-info"><div class="s-name">${a.name}</div><div class="s-desc">${a.desc}${warn?' · '+warn:''}</div></div>
      <div class="s-effects">${eff}</div>
    </div>`;
  }).join('');
}

function renderProfile(){
  drawRadar();
  // 属性（带说明）
  const statHelp={
    beauty:'💎 颜值越高，品牌代言费越高，美容效果越好',
    talent:'🎵 才艺决定事件成功率、工作质量，阶段1必须≥50',
    stamina:'⚡ 体力是行动的基础，体力<20部分行动受限',
    popularity:'🔥 人气影响粉丝增长速度、热搜频率，阶段2必须≥30',
    eq:'💬 情商影响危机处理能力、NPC关系修复、绯闻伤害减免',
    money:'💰 每天自动扣200生活费，阶段3必须≥5000',
    fans:'👥 粉丝是影响力的核心，各种结局都需要粉丝支撑',
    exposure:'📸 曝光>50需花钱公关，>70锁行动，>85可能塌房'
  };
  document.getElementById('profile-stats').innerHTML=[
    {l:'💎颜值',v:state.beauty,help:statHelp.beauty},{l:'🎵才艺',v:state.talent,help:statHelp.talent},
    {l:'⚡体力',v:state.stamina,help:statHelp.stamina},{l:'🔥人气',v:state.popularity,help:statHelp.popularity},
    {l:'💬情商',v:state.eq,help:statHelp.eq},{l:'💰金钱',v:state.money,c:'pink',help:statHelp.money},
    {l:'👥粉丝',v:formatNum(state.fans),c:'pink',help:statHelp.fans},{l:'📸曝光',v:state.exposure+'%',help:statHelp.exposure}
  ].map(s=>`<div class="profile-stat stat-item" data-help="${s.help||''}">
    <span class="s-label">${s.l}</span>
    <span class="s-val ${s.c||''}">${s.v}</span>
  </div>`).join('');

  // 点击属性显示说明
  document.querySelectorAll('.stat-item').forEach(el=>{
    el.addEventListener('click',function(){
      const help=this.dataset.help;
      if(!help)return;
      showToast(help);
    });
  });

  // 关系
  if(state.relations){
    const r=state.relations;
    document.getElementById('profile-relations').innerHTML=[
      {l:'👩‍💼 经纪人',v:r.agent,t:getRelationLevel(r.agent)},
      {l:'💕 粉丝',v:r.fans,t:getRelationLevel(r.fans)},
      {l:'🏪 品牌',v:r.brand,t:getRelationLevel(r.brand)}
    ].map(s=>`<div class="profile-stat"><span class="s-label">${s.l}</span><span class="s-val" style="font-size:12px;font-weight:400;color:#666">${s.v} · ${s.t}</span></div>`).join('');
  }

  const grid=document.getElementById('achieve-grid');
  const unlocked=state.achievements||[];
  document.getElementById('ach-count').textContent=`(${unlocked.length}/${ACHIEVEMENTS.length})`;
  grid.innerHTML=ACHIEVEMENTS.map(a=>`<div class="ach-item ${unlocked.includes(a.id)?'':'locked'}"><span class="ach-icon">${unlocked.includes(a.id)?a.icon:'🔒'}</span><span class="ach-name">${a.name}</span></div>`).join('');
}

function renderExposure(){
  const fill=document.getElementById('exposure-fill');
  document.getElementById('exposure-text').textContent=state.exposure+'%';
  fill.style.width=state.exposure+'%';
}

function renderRecentLog(){
  const el=document.getElementById('recent-log');
  const logs=state.log.slice(-5);
  let html=logs.length>0?logs.map(l=>`<div>📅 Day${l.day} ${l.msg}</div>`).join(''):'<div style="color:#ccc">开始你的偶像之旅吧！</div>';
  // 加上今日心情和八卦
  if(state.dailyVibe){
    html=`<div style="color:#7b4a5e;font-weight:500;margin-bottom:4px">${state.dailyVibe.emoji} 今日心情：${state.dailyVibe.mood}</div>`+html;
  }
  if(state.dailyGossip&&logs.length>0){
    html+=`<div style="color:#bbb;font-size:11px;margin-top:4px;border-top:1px solid #f0e0e8;padding-top:4px">📰 ${state.dailyGossip}</div>`;
  }
  el.innerHTML=html;
}

function switchPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pageId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===pageId));
  if(pageId==='home'){renderQuickStats();renderTrending();renderRecentLog()}
  if(pageId==='msg')renderMessages();
  if(pageId==='schedule')renderSchedule();
  if(pageId==='profile')renderProfile();
  document.getElementById('main-content').scrollTop=0;
}

// 渲染头像（支持emoji和自定义图片）
function renderAvatar(){
  const textEl=document.getElementById('avatar-text');
  const imgEl=document.getElementById('avatar-img');
  if(!state)return;
  if(state.avatar&&state.avatar.startsWith('data:image/')){
    textEl.classList.add('hidden');
    imgEl.classList.remove('hidden');
    imgEl.src=state.avatar;
  }else{
    textEl.classList.remove('hidden');
    imgEl.classList.add('hidden');
    textEl.textContent=state.avatar||'👩‍🎤';
  }
}

function renderAll(){
  if(!state)return;
  document.getElementById('day-num').textContent=state.day;
  const stage=getStage(state.day);
  document.getElementById('stage-tag').textContent=stage.emoji+stage.name;
  renderAvatar();
  document.getElementById('fans-display').textContent=formatNum(state.fans);
  renderExposure();renderGoalBar();
  const active=document.querySelector('.page.active');
  if(active){
    const id=active.id.replace('page-','');
    if(id==='home'){renderQuickStats();renderTrending();renderRecentLog()}
    else if(id==='msg')renderMessages();
    else if(id==='schedule')renderSchedule();
    else if(id==='profile')renderProfile();
  }
  checkAchievements();checkFanMilestones();
}

/* ================================================================
   初始化
   ================================================================ */
function resetToIntro(){
  document.getElementById('phone-frame').classList.add('hidden');
  document.getElementById('bottom-nav').classList.add('hidden');
  document.getElementById('ending-screen').classList.add('hidden');
  document.getElementById('intro-screen').classList.remove('hidden');state=null;
}
function startGame(name,avatar){
  state=defaultState(name,avatar);
  document.getElementById('intro-screen').classList.add('hidden');
  document.getElementById('phone-frame').classList.remove('hidden');
  document.getElementById('bottom-nav').classList.remove('hidden');
  addMessage('agent','👩‍💼','经纪人杨姐','你好呀！我是你的经纪人杨姐，以后咱们就是一家人了！有问题随时找我～💕','经纪人');
  generateTrending();switchPage('schedule');renderAll();saveGame();
  setTimeout(()=>showStageStory(getStage(1)),400);
}

/* ================================================================
   事件绑定
   ================================================================ */
document.addEventListener('DOMContentLoaded',function(){
  // 优先处理读档
  if(loadGame()&&state&&state.day<=60){
    document.getElementById('intro-screen').classList.add('hidden');
    document.getElementById('phone-frame').classList.remove('hidden');
    document.getElementById('bottom-nav').classList.remove('hidden');
    renderAll();switchPage('home');
    // 不要在这里return，继续绑定其他事件
  }
  // 自定义上传头像（始终绑定）
  let customAvatarDataUrl=null;
  const fileInput=document.getElementById('avatar-upload');
  if(fileInput){
    fileInput.addEventListener('change',function(e){
      const file=e.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=function(ev){
        customAvatarDataUrl=ev.target.result;
        const preview=document.getElementById('custom-avatar-preview');
        const img=document.getElementById('custom-avatar-img');
        if(preview&&img){preview.style.display='block';img.src=customAvatarDataUrl}
        document.querySelectorAll('.av-opt').forEach(el=>el.classList.remove('selected'));
        showToast('📸 头像上传成功！');
        soundClick();
      };
      reader.readAsDataURL(file);
    });
  }
  // 头像预设选择
  document.querySelectorAll('.av-opt').forEach(el=>{
    el.addEventListener('click',function(){
      document.querySelectorAll('.av-opt').forEach(e=>e.classList.remove('selected'));
      this.classList.add('selected');
      customAvatarDataUrl=null;
      const preview=document.getElementById('custom-avatar-preview');
      if(preview)preview.style.display='none';
    });
  });
  // 开始按钮（始终绑定）
  document.getElementById('start-game-btn').addEventListener('click',function(){
    const name=document.getElementById('player-name').value.trim()||'星光学员';
    const avatar=customAvatarDataUrl||document.querySelector('.av-opt.selected')?.dataset.av||'👩‍🎤';
    startGame(name,avatar);
  });
  document.getElementById('player-name').addEventListener('keydown',function(e){
    if(e.key==='Enter')document.getElementById('start-game-btn').click()
  });
});

document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',function(){switchPage(this.dataset.page);soundClick()})});

document.getElementById('avatar-btn').addEventListener('click',function(){
  if(!state)return;
  // 自定义头像不能通过点击切换
  if(state.avatar&&state.avatar.startsWith('data:image/')){showToast('长按可更换头像哦 📸');return}
  const avs=['👩‍🎤','👸','🧝‍♀️','🦊','🌸','💃','🦸‍♀️','👼'];
  state.avatar=avs[(avs.indexOf(state.avatar)+1)%avs.length];
  renderAvatar();saveGame();soundClick();
});

document.getElementById('sched-actions').addEventListener('click',function(e){
  const btn=e.target.closest('.sched-btn');
  if(!btn||btn.classList.contains('disabled'))return;
  if(btn.dataset.action)executeAction(btn.dataset.action);
});

// 更多页
